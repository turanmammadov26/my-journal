<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Judo Scout</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --surface: #18181c;
    --surface2: #222228;
    --border: rgba(255,255,255,0.08);
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #888;
    --danger: #ff4d4d;
    --success: #47e8a0;
    --info: #47b4e8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 50;
  }
  .logo { font-family: 'Bebas Neue', cursive; font-size: 26px; letter-spacing: 2px; color: var(--accent); line-height: 1; }
  .logo span { color: var(--text); }
  .header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .count-badge { margin-left: auto; background: var(--accent); color: #000; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }

  /* MAIN LAYOUT */
  .container { max-width: 480px; margin: 0 auto; padding: 16px; }

  /* SEARCH */
  .search-wrap { position: relative; margin-bottom: 12px; }
  .search-wrap input {
    width: 100%; padding: 11px 14px 11px 40px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 14px;
    font-family: 'IBM Plex Sans', sans-serif;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { outline: none; border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 15px; color: var(--muted); pointer-events: none; }

  /* FILTERS */
  .filters { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 2px; }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    cursor: pointer; white-space: nowrap; transition: all 0.15s;
    font-family: 'IBM Plex Sans', sans-serif;
  }
  .filter-btn.active { background: var(--accent); color: #000; border-color: transparent; }
  .filter-btn:not(.active):hover { border-color: var(--accent); color: var(--accent); }

  /* ADD BUTTON */
  .add-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 11px; margin-bottom: 16px;
    background: transparent; border: 1px dashed rgba(232,255,71,0.3);
    border-radius: 10px; color: var(--accent); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; font-family: 'IBM Plex Sans', sans-serif;
  }
  .add-btn:hover { background: rgba(232,255,71,0.05); border-color: var(--accent); }

  /* RIVAL CARDS */
  .rival-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
    cursor: pointer; transition: border-color 0.15s, transform 0.1s;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform:none; } }
  .rival-card:hover { border-color: rgba(232,255,71,0.3); transform: translateY(-1px); }
  .card-top { display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 44px; height: 44px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', cursive; font-size: 18px; flex-shrink: 0;
  }
  .card-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .card-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .card-arrow { margin-left: auto; color: var(--muted); font-size: 16px; }
  .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
  .tag {
    font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: 500;
    border: 1px solid transparent;
  }
  .t-yellow { background: rgba(232,255,71,0.1); color: var(--accent); border-color: rgba(232,255,71,0.2); }
  .t-orange { background: rgba(255,107,53,0.1); color: var(--accent2); border-color: rgba(255,107,53,0.2); }
  .t-blue { background: rgba(71,180,232,0.1); color: var(--info); border-color: rgba(71,180,232,0.2); }
  .t-red { background: rgba(255,77,77,0.1); color: var(--danger); border-color: rgba(255,77,77,0.2); }
  .t-green { background: rgba(71,232,160,0.1); color: var(--success); border-color: rgba(71,232,160,0.2); }

  .no-results { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 14px; }
  .no-results .emoji { font-size: 36px; display: block; margin-bottom: 8px; }

  /* OVERLAY */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 100;
    align-items: flex-end; justify-content: center;
  }
  .overlay.open { display: flex; }
  .sheet {
    background: var(--surface); border-radius: 16px 16px 0 0;
    width: 100%; max-width: 480px; padding: 16px 20px 28px;
    max-height: 88vh; overflow-y: auto;
    animation: slideUp 0.25s cubic-bezier(0.32,0.72,0,1);
  }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0.5; } to { transform: none; opacity: 1; } }
  .handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }

  /* DETAIL */
  .detail-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
  .detail-avatar { width: 56px; height: 56px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', cursive; font-size: 22px; flex-shrink: 0; }
  .detail-name { font-family: 'Bebas Neue', cursive; font-size: 24px; letter-spacing: 1px; line-height: 1.1; }
  .detail-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .info-cell { background: var(--surface2); border-radius: 8px; padding: 10px 12px; }
  .info-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .info-value { font-size: 14px; font-weight: 500; }
  .section-title { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin: 14px 0 7px; }
  .technique-list { display: flex; flex-wrap: wrap; gap: 5px; }
  .notes-box { background: var(--surface2); border-radius: 8px; padding: 10px 12px; font-size: 13px; color: #ccc; line-height: 1.65; }
  .divider { height: 1px; background: var(--border); margin: 14px 0; }
  .sheet-actions { display: flex; gap: 8px; margin-top: 16px; }
  .btn-close { flex: 1; padding: 11px; background: var(--surface2); border: none; border-radius: 8px; color: var(--muted); font-size: 14px; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; }
  .btn-delete { padding: 11px 18px; background: rgba(255,77,77,0.1); border: 1px solid rgba(255,77,77,0.2); border-radius: 8px; color: var(--danger); font-size: 14px; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; }

  /* FORM */
  .form-title { font-family: 'Bebas Neue', cursive; font-size: 22px; letter-spacing: 1px; margin-bottom: 16px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .form-group { margin-bottom: 11px; }
  .form-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 5px; }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%; padding: 9px 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px;
    font-family: 'IBM Plex Sans', sans-serif; transition: border-color 0.15s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { outline: none; border-color: var(--accent); }
  .form-group textarea { min-height: 72px; resize: vertical; }
  .form-group select option { background: #222; }
  .save-btn {
    width: 100%; padding: 12px;
    background: var(--accent); color: #000; font-weight: 600; font-size: 14px;
    border: none; border-radius: 8px; cursor: pointer; margin-top: 4px;
    font-family: 'IBM Plex Sans', sans-serif; transition: opacity 0.15s;
  }
  .save-btn:hover { opacity: 0.9; }
  .cancel-btn {
    width: 100%; padding: 10px; background: transparent; border: none;
    color: var(--muted); font-size: 14px; cursor: pointer; margin-top: 4px;
    font-family: 'IBM Plex Sans', sans-serif;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">Judo<span>Scout</span></div>
    <div class="header-sub">база соперников</div>
  </div>
  <div class="count-badge" id="countBadge">0</div>
</div>

<div class="container">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Поиск по имени, фамилии, стране..." oninput="renderList()">
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">Все</button>
    <button class="filter-btn" onclick="setFilter('левша',this)">Левши</button>
    <button class="filter-btn" onclick="setFilter('правша',this)">Правши</button>
    <button class="filter-btn" onclick="setFilter('стойка',this)">Меняют стойку</button>
  </div>

  <button class="add-btn" onclick="openForm()">
    <span style="font-size:18px;line-height:1;">+</span> Добавить соперника
  </button>

  <div id="rivalList"></div>
</div>

<!-- DETAIL OVERLAY -->
<div class="overlay" id="detailOverlay" onclick="closeDetailEv(event)">
  <div class="sheet" id="detailSheet">
    <div class="handle"></div>
    <div id="detailContent"></div>
  </div>
</div>

<!-- FORM OVERLAY -->
<div class="overlay" id="formOverlay" onclick="closeFormEv(event)">
  <div class="sheet" id="formSheet">
    <div class="handle"></div>
    <div class="form-title">Новый соперник</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Имя *</label><input id="fName" placeholder="Анна"></div>
      <div class="form-group"><label class="form-label">Фамилия *</label><input id="fSurname" placeholder="Иванова"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Страна / клуб</label><input id="fCountry" placeholder="Россия"></div>
      <div class="form-group"><label class="form-label">Весовая категория</label><input id="fWeight" placeholder="-63 кг"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Рука</label>
        <select id="fHand"><option>правша</option><option>левша</option></select>
      </div>
      <div class="form-group"><label class="form-label">Стойка</label>
        <select id="fStance"><option>правая</option><option>левая</option><option>меняет</option></select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Хват</label>
      <select id="fGrip"><option>правосторонний</option><option>левосторонний</option><option>нестандартный</option><option>двойной лацкан</option><option>глубокий на спину</option></select>
    </div>
    <div class="form-group"><label class="form-label">Любимые броски (через запятую)</label>
      <input id="fThrows" placeholder="сэой-наге, осото-гари, хипп...">
    </div>
    <div class="form-group"><label class="form-label">Партер: болевые / удушения</label>
      <input id="fNe" placeholder="кеса-гатамэ, дзюдзи-дзимэ...">
    </div>
    <div class="form-group"><label class="form-label">Сильные стороны</label>
      <input id="fStrong" placeholder="взрывная атака, хорошая физика...">
    </div>
    <div class="form-group"><label class="form-label">Слабые стороны</label>
      <input id="fWeak" placeholder="защита от подхватов, медленный старт...">
    </div>
    <div class="form-group"><label class="form-label">Тактические заметки</label>
      <textarea id="fNotes" placeholder="Начинает с атаки на рукав, любит контратаки..."></textarea>
    </div>
    <button class="save-btn" onclick="saveRival()">Сохранить</button>
    <button class="cancel-btn" onclick="closeForm()">Отмена</button>
  </div>
</div>

<script>
const AVATARS = [
  {bg:'rgba(232,255,71,0.15)',color:'#e8ff47'},
  {bg:'rgba(255,107,53,0.15)',color:'#ff6b35'},
  {bg:'rgba(71,180,232,0.15)',color:'#47b4e8'},
  {bg:'rgba(71,232,160,0.15)',color:'#47e8a0'},
  {bg:'rgba(180,71,232,0.15)',color:'#b447e8'},
  {bg:'rgba(232,71,71,0.15)',color:'#e84747'},
];

const STORAGE_KEY = 'judoscout_rivals';

let rivals = [];
let nextId = 1;
let filterMode = 'all';
let openedId = null;

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { const d = JSON.parse(raw); rivals = d.rivals || []; nextId = d.nextId || 1; }
  } catch(e) {}
  if (!rivals.length) {
    rivals = [
      {id:1,name:'Мария',surname:'Ковалёва',country:'Украина',weight:'-57 кг',hand:'правша',grip:'правосторонний',stance:'правая',throws:['сэой-наге','косото-гари'],ne:['кеса-гатамэ'],weak:'медленный старт',strong:'взрывная атака',notes:'Предпочитает атаковать в первые 30 секунд. Часто делает ложные атаки для захвата рукава.'},
      {id:2,name:'Алина',surname:'Петрова',country:'Беларусь',weight:'-57 кг',hand:'левша',grip:'левосторонний',stance:'левая',throws:['осото-гари','хипп-гаэши'],ne:['дзюдзи-дзимэ'],weak:'работа в партере',strong:'длинные руки, хороший хват',notes:'Левша — держать дистанцию с правой стороны. Слабо защищается от скручивания в партере.'},
      {id:3,name:'Дарья',surname:'Сидорова',country:'Россия',weight:'-63 кг',hand:'правша',grip:'двойной лацкан',stance:'меняет',throws:['уки-гоши','морот-сэой'],ne:['юко-гатамэ'],weak:'контратаки',strong:'вязкий хват, выносливость',notes:'Меняет стойку. Тянет к себе и атакует через бедро. Слабо реагирует на смену темпа.'},
    ];
    nextId = 4;
    save();
  }
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({rivals, nextId})); } catch(e) {}
}

function avColor(id) { return AVATARS[id % AVATARS.length]; }
function initials(r) { return (r.name[0] + (r.surname[0]||'')).toUpperCase(); }

function score(r, q) {
  if (!q) return 1;
  q = q.toLowerCase().trim();
  const full = (r.name+' '+r.surname).toLowerCase();
  const rev = (r.surname+' '+r.name).toLowerCase();
  if (full.startsWith(q) || rev.startsWith(q)) return 4;
  if (full.includes(q) || rev.includes(q)) return 3;
  if (r.country.toLowerCase().includes(q)) return 2;
  if ((r.name+r.surname).toLowerCase().includes(q.replace(/\s/g,''))) return 1;
  return 0;
}

function renderList() {
  const q = document.getElementById('searchInput').value.trim();
  let list = [...rivals];
  if (filterMode === 'левша') list = list.filter(r => r.hand === 'левша');
  else if (filterMode === 'правша') list = list.filter(r => r.hand === 'правша');
  else if (filterMode === 'стойка') list = list.filter(r => r.stance === 'меняет');
  if (q) list = list.filter(r => score(r,q) > 0).sort((a,b) => score(b,q) - score(a,q));

  document.getElementById('countBadge').textContent = rivals.length;
  const el = document.getElementById('rivalList');
  if (!list.length) {
    el.innerHTML = '<div class="no-results"><span class="emoji">🥋</span>Нет соперников по запросу</div>';
    return;
  }
  el.innerHTML = list.map(r => {
    const av = avColor(r.id);
    const tags = [
      `<span class="tag t-yellow">${r.hand}</span>`,
      `<span class="tag t-blue">${r.weight}</span>`,
      `<span class="tag t-blue">${r.grip}</span>`,
      ...r.throws.slice(0,2).map(t => `<span class="tag t-orange">${t}</span>`),
      r.weak ? `<span class="tag t-red">↓ ${r.weak.slice(0,22)}</span>` : '',
      r.strong ? `<span class="tag t-green">↑ ${r.strong.slice(0,18)}</span>` : '',
    ].filter(Boolean).join('');
    return `<div class="rival-card" onclick="openDetail(${r.id})">
      <div class="card-top">
        <div class="avatar" style="background:${av.bg};color:${av.color}">${initials(r)}</div>
        <div>
          <div class="card-name">${r.name} ${r.surname}</div>
          <div class="card-sub">${r.country} · ${r.stance} стойка</div>
        </div>
        <div class="card-arrow">›</div>
      </div>
      <div class="tags">${tags}</div>
    </div>`;
  }).join('');
}

function setFilter(f, btn) {
  filterMode = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function openDetail(id) {
  const r = rivals.find(x => x.id === id); if (!r) return;
  openedId = id;
  const av = avColor(r.id);
  document.getElementById('detailContent').innerHTML = `
    <div class="detail-header">
      <div class="detail-avatar" style="background:${av.bg};color:${av.color}">${initials(r)}</div>
      <div>
        <div class="detail-name">${r.name} ${r.surname}</div>
        <div class="detail-sub">${r.country}</div>
      </div>
    </div>
    <div class="info-grid">
      <div class="info-cell"><div class="info-label">Рука</div><div class="info-value" style="color:var(--accent)">${r.hand}</div></div>
      <div class="info-cell"><div class="info-label">Весовая</div><div class="info-value">${r.weight}</div></div>
      <div class="info-cell"><div class="info-label">Хват</div><div class="info-value">${r.grip}</div></div>
      <div class="info-cell"><div class="info-label">Стойка</div><div class="info-value">${r.stance}</div></div>
    </div>
    <div class="section-title">Любимые броски</div>
    <div class="technique-list">${r.throws.length ? r.throws.map(t=>`<span class="tag t-orange">${t}</span>`).join('') : '<span style="color:var(--muted);font-size:13px">не указано</span>'}</div>
    <div class="section-title">Партер (болевые / удушения)</div>
    <div class="technique-list">${r.ne.length ? r.ne.map(t=>`<span class="tag t-blue">${t}</span>`).join('') : '<span style="color:var(--muted);font-size:13px">не указано</span>'}</div>
    <div class="divider"></div>
    <div class="section-title">Сильные стороны</div>
    <div class="notes-box" style="color:var(--success)">${r.strong || '—'}</div>
    <div class="section-title">Слабые стороны</div>
    <div class="notes-box" style="color:var(--danger)">${r.weak || '—'}</div>
    <div class="section-title">Тактические заметки</div>
    <div class="notes-box">${r.notes || '—'}</div>
    <div class="sheet-actions">
      <button class="btn-close" onclick="closeDetail()">Закрыть</button>
      <button class="btn-delete" onclick="deleteRival(${r.id})">Удалить</button>
    </div>
  `;
  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetailEv(e) { if (e.target === document.getElementById('detailOverlay')) closeDetail(); }
function closeDetail() { document.getElementById('detailOverlay').classList.remove('open'); openedId = null; }

function deleteRival(id) {
  if (!confirm('Удалить соперника?')) return;
  rivals = rivals.filter(r => r.id !== id);
  save(); closeDetail(); renderList();
}

function openForm() { document.getElementById('formOverlay').classList.add('open'); }
function closeForm() { document.getElementById('formOverlay').classList.remove('open'); }
function closeFormEv(e) { if (e.target === document.getElementById('formOverlay')) closeForm(); }

function saveRival() {
  const name = document.getElementById('fName').value.trim();
  const surname = document.getElementById('fSurname').value.trim();
  if (!name || !surname) { alert('Введи имя и фамилию'); return; }
  rivals.push({
    id: nextId++, name, surname,
    country: document.getElementById('fCountry').value.trim() || 'Неизвестно',
    weight: document.getElementById('fWeight').value.trim() || '—',
    hand: document.getElementById('fHand').value,
    grip: document.getElementById('fGrip').value,
    stance: document.getElementById('fStance').value,
    throws: document.getElementById('fThrows').value.split(',').map(s=>s.trim()).filter(Boolean),
    ne: document.getElementById('fNe').value.split(',').map(s=>s.trim()).filter(Boolean),
    strong: document.getElementById('fStrong').value.trim(),
    weak: document.getElementById('fWeak').value.trim(),
    notes: document.getElementById('fNotes').value.trim(),
  });
  save();
  ['fName','fSurname','fCountry','fWeight','fThrows','fNe','fStrong','fWeak','fNotes'].forEach(id => document.getElementById(id).value = '');
  closeForm(); renderList();
}

load(); renderList();
</script>
