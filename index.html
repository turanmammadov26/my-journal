<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дневник</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

/* ── BASE ── */
:root {
  --bg: #0e0e0e;
  --surface: rgba(255,255,255,0.03);
  --text: #efefef;
  --muted: #444;
  --border: rgba(255,255,255,0.07);
  --accent: #efefef;
  --accent2: #888;
  --glow: transparent;
  --cell-text: #000;
  --T: 0.4s cubic-bezier(0.4,0,0.2,1);
}

/* ── THEMES ── */
body.theme-bw  { --bg: #0a0a0a; --glow: transparent; }
body.theme-indigo { --bg: #0c0d18; }
body.theme-cyber  { --bg: #040a06; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 0 100px;
  transition: background var(--T);
  position: relative;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 70% 40% at 50% 0%, var(--glow), transparent 65%);
  pointer-events: none;
  z-index: 0;
  transition: background var(--T);
}
.wrap { width:100%; max-width:560px; position:relative; z-index:1; }

/* ── THEME SWITCHER ── */
.theme-bar {
  display: flex;
  justify-content: flex-end;
  gap: 6px;
  padding: 14px 24px 10px;
}
.th-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.15s;
  position: relative;
}
.th-btn:hover { transform: scale(1.15); }
.th-btn.active { border-color: var(--accent); }
.th-btn[data-theme="bw"]     { background: #fff; }
.th-btn[data-theme="indigo"] { background: #7c6ff7; }
.th-btn[data-theme="cyber"]  { background: #00ff88; }
.th-btn span {
  position: absolute;
  bottom: -18px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 8px;
  letter-spacing: 0.08em;
  color: var(--muted);
  white-space: nowrap;
  display: none;
}
.th-btn:hover span { display: block; }

/* ── TABS ── */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
  transition: background var(--T);
}
.tab {
  flex: 1;
  padding: 16px 0;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  background: none;
  border: none;
  cursor: pointer;
  transition: color var(--T);
  position: relative;
}
.tab::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 25%; width: 50%; height: 1px;
  background: var(--accent);
  transform: scaleX(0);
  transition: transform var(--T), background var(--T);
}
.tab.active { color: var(--text); }
.tab.active::after { transform: scaleX(1); }

/* ── PAGES ── */
.page { display:none; padding: 36px 24px; }
.page.active { display:block; }

/* ── HEADER ── */
.hdr { margin-bottom: 40px; }
.hdr-date {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.hdr-title {
  font-size: clamp(34px, 9vw, 54px);
  font-weight: 300;
  line-height: 1.05;
  letter-spacing: -0.03em;
  color: var(--text);
}
.hdr-title strong {
  font-weight: 500;
  color: var(--accent);
  transition: color var(--T);
}

/* ── LABEL ── */
.lbl {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

/* ── RATING ── */
.rating-row { display:flex; align-items:flex-end; gap:10px; margin-bottom:20px; }
.big-num {
  font-size: 92px;
  font-weight: 300;
  line-height: 0.9;
  color: var(--accent);
  transition: color var(--T);
  letter-spacing: -0.04em;
  min-width: 130px;
}
.big-side { display:flex; flex-direction:column; gap:6px; padding-bottom:6px; }
.big-denom { font-family:'DM Mono',monospace; font-size:15px; color:var(--muted); }
.big-lbl {
  font-size: 13px;
  font-weight: 300;
  font-style: italic;
  color: var(--muted);
  transition: color var(--T);
}

input[type=range] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 3px;
  border-radius: 2px; outline: none; cursor: pointer;
  margin-bottom: 8px;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--bg);
  box-shadow: 0 0 0 1px var(--accent);
  cursor: pointer; margin-top: -7px;
  transition: background var(--T);
}
input[type=range]::-moz-range-thumb {
  width:18px; height:18px; border-radius:50%;
  background: var(--accent); border: 2px solid var(--bg); cursor:pointer;
}
.slider-marks { display:flex; justify-content:space-between; }
.slider-marks span { font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); }

.divider { height:1px; background:var(--border); margin:28px 0; }

/* ── TEXTAREA ── */
.note-wrap { margin-bottom:26px; }
textarea {
  width: 100%; background: transparent;
  border: none; border-bottom: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px; font-weight: 300;
  line-height: 1.8; padding: 4px 0 14px;
  resize: none; outline: none; min-height: 120px;
  caret-color: var(--accent);
  transition: border-color var(--T);
}
textarea::placeholder { color: var(--muted); opacity: 0.45; }
textarea:focus { border-bottom-color: var(--accent); }
.char-ct { font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); text-align:right; margin-top:6px; }

/* ── SAVE ── */
.btn-save {
  width: 100%; padding: 14px;
  background: var(--accent); color: var(--bg);
  border: none;
  font-family: 'DM Mono', monospace;
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.18em; text-transform: uppercase;
  cursor: pointer;
  transition: background var(--T), opacity 0.15s, transform 0.15s;
}
.btn-save:hover { opacity: 0.8; transform: translateY(-1px); }
.btn-save:active { transform: translateY(0); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--accent); color: var(--bg);
  padding: 10px 24px;
  font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 500;
  opacity: 0;
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s, background var(--T);
  pointer-events: none; z-index: 200; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ══ MONTH PAGE ══ */
.month-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; }
.mnav-btn {
  background: none; border: none; color: var(--muted);
  font-size: 20px; cursor: pointer; padding: 6px 12px;
  font-family: 'DM Mono', monospace;
  transition: color 0.2s;
}
.mnav-btn:hover { color: var(--text); }
.month-name {
  font-size: 24px; font-weight: 300; letter-spacing: -0.02em;
  text-align: center;
}
.month-year {
  font-family: 'DM Mono', monospace;
  font-size: 10px; color: var(--muted); letter-spacing: 0.18em; text-align: center; margin-top: 3px;
}

/* calendar */
.cal-head { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; margin-bottom:2px; }
.cal-head span {
  font-family: 'DM Mono', monospace;
  font-size: 8px; letter-spacing: 0.12em; color: var(--muted);
  text-align: center; padding: 4px 0; text-transform: uppercase;
}
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
.cal-cell {
  aspect-ratio: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--surface); border-radius: 2px;
  transition: transform 0.15s;
  position: relative;
}
.cal-cell.has-entry { cursor: pointer; }
.cal-cell.has-entry:hover { transform: scale(1.07); z-index: 2; }
.cal-cell.today { outline: 1px solid var(--accent); outline-offset: -1px; }
.cal-cell.empty { background: transparent; }
.cal-day-num {
  font-family: 'DM Mono', monospace;
  font-size: 9px; color: var(--muted); line-height: 1; margin-bottom: 1px;
}
.cal-cell.has-entry .cal-day-num { color: rgba(0,0,0,0.65); font-weight: 500; }
.cal-score { font-size: 11px; font-weight: 500; color: #000; line-height: 1; }

/* ── DETAIL ── */
.detail {
  margin-top: 22px;
  border-left: 1px solid var(--accent);
  padding: 14px 18px;
  background: var(--surface);
  display: none;
  animation: fadeUp 0.22s ease;
  transition: border-color var(--T);
}
.detail.visible { display: block; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.detail-date {
  font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
}
.detail-score {
  font-size: 44px; font-weight: 300; letter-spacing: -0.04em;
  line-height: 1; margin-bottom: 2px;
  transition: color var(--T);
}
.detail-label {
  font-size: 12px; font-weight: 300; font-style: italic;
  color: var(--muted); margin-bottom: 14px;
}
.detail-note { font-size: 15px; font-weight: 300; line-height: 1.75; color: rgba(240,240,240,0.7); }
.no-note { font-size: 12px; font-style: italic; color: var(--muted); opacity: 0.4; }
</style>
</head>
<body class="theme-bw">
<div class="wrap">

  <!-- THEME SWITCHER -->
  <div class="theme-bar">
    <button class="th-btn active" data-theme="bw" title="Ч/Б"><span>ч/б</span></button>
    <button class="th-btn" data-theme="indigo" title="Индиго"><span>индиго</span></button>
    <button class="th-btn" data-theme="cyber" title="Киберпанк"><span>кибер</span></button>
  </div>

  <!-- TABS -->
  <nav class="tabs">
    <button class="tab active" data-tab="today">сегодня</button>
    <button class="tab" data-tab="month">месяц</button>
  </nav>

  <!-- TODAY -->
  <div class="page active" id="tab-today">
    <div class="hdr">
      <div class="hdr-date" id="dateDisplay">—</div>
      <h1 class="hdr-title">мой <strong>день</strong></h1>
    </div>

    <div class="lbl">оценка дня</div>
    <div class="rating-row">
      <div class="big-num" id="ratingNum">7.0</div>
      <div class="big-side">
        <div class="big-denom">/ 10</div>
        <div class="big-lbl" id="ratingLabel">хорошо</div>
      </div>
    </div>
    <input type="range" id="ratingSlider" min="1" max="10" step="0.5" value="7">
    <div class="slider-marks"><span>1</span><span>3</span><span>5</span><span>7</span><span>10</span></div>

    <div class="divider"></div>

    <div class="lbl">заметка</div>
    <div class="note-wrap">
      <textarea id="noteArea" placeholder="Что произошло сегодня…" maxlength="500"></textarea>
      <div class="char-ct"><span id="charCount">0</span> / 500</div>
    </div>
    <button class="btn-save" id="saveBtn">сохранить день</button>
  </div>

  <!-- MONTH -->
  <div class="page" id="tab-month">
    <div class="month-nav">
      <button class="mnav-btn" id="prevMonth">‹</button>
      <div>
        <div class="month-name" id="monthName">—</div>
        <div class="month-year" id="monthYear">—</div>
      </div>
      <button class="mnav-btn" id="nextMonth">›</button>
    </div>

    <div class="cal-head">
      <span>пн</span><span>вт</span><span>ср</span><span>чт</span><span>пт</span><span>сб</span><span>вс</span>
    </div>
    <div class="cal-grid" id="calGrid"></div>

    <div class="detail" id="detail">
      <div class="detail-date" id="detailDate"></div>
      <div class="detail-score" id="detailScore"></div>
      <div class="detail-label" id="detailLabel"></div>
      <div id="detailNote"></div>
    </div>
  </div>

</div>
<div class="toast" id="toast">сохранено</div>

<script>
/* ── THEME PALETTES ── */
// scale[0]=rating1 … scale[9]=rating10
// uiScale: accent color shown on big number / slider / button per rating
const THEMES = {
  bw: {
    scale:    ['#1a1a1a','#252525','#333','#444','#565656','#6e6e6e','#888','#aaa','#ccc','#fff'],
    cellText: (i) => i < 5 ? '#888' : '#000',
    uiScale:  ['#3a3a3a','#484848','#595959','#6e6e6e','#888','#999','#aaa','#c0c0c0','#dedede','#ffffff'],
    glow:     (col) => 'transparent',
  },
  indigo: {
    scale:    ['#1a0a2e','#231245','#2e1a60','#3b2580','#5040a8','#6655c8','#7c6ff7','#9b8eff','#b8aeff','#d4cfff'],
    cellText: (i) => i < 4 ? '#a090ff' : '#fff',
    uiScale:  ['#2e1060','#3b1a7a','#4a2898','#5c3ab8','#6e50cc','#7c6ff7','#8e80ff','#a89eff','#c0b8ff','#d4cfff'],
    glow:     (col) => `rgba(${hexToRgb(col)},0.14)`,
  },
  cyber: {
    scale:    ['#001a0a','#002a10','#003d18','#005522','#007a30','#00a840','#00cc55','#00ee66','#00ff88','#aaffdd'],
    cellText: (i) => i < 3 ? '#00cc55' : '#000',
    uiScale:  ['#004418','#005a20','#007a30','#009940','#00bb50','#00cc55','#00dd66','#00ee77','#00ff88','#aaffdd'],
    glow:     (col) => `rgba(${hexToRgb(col)},0.12)`,
  },
};

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

const LABELS = {
  1:'ужасно',1.5:'ужасно',2:'очень плохо',2.5:'очень плохо',
  3:'плохо',3.5:'плохо',4:'так себе',4.5:'так себе',
  5:'нормально',5.5:'нормально',6:'неплохо',6.5:'неплохо',
  7:'хорошо',7.5:'хорошо',8:'отлично',8.5:'отлично',
  9:'прекрасно',9.5:'прекрасно',10:'невероятно'
};
const MONTHS_RU  = ['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
const MONTHS_GEN = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const DAYS_RU    = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];

// ── STORAGE LAYER ──
// Tries Telegram CloudStorage first, falls back to localStorage.
// Telegram CloudStorage stores string values under string keys.
// We chunk entries into monthly buckets: key = "entries_YYYY_MM"
// so we stay well under the 4096-char value limit per key.

const TG = window.Telegram?.WebApp;
if (TG) TG.ready();

const Storage = {
  // Is Telegram CloudStorage available?
  _tg: !!(TG?.CloudStorage),

  _getLocal(key) {
    try { return localStorage.getItem(key); } catch { return null; }
  },
  _setLocal(key, val) {
    try { localStorage.setItem(key, val); } catch {}
  },

  // Promise-based get
  get(key) {
    return new Promise(resolve => {
      if (this._tg) {
        TG.CloudStorage.getItem(key, (err, val) => resolve(err ? null : (val || null)));
      } else {
        resolve(this._getLocal(key));
      }
    });
  },

  // Promise-based set
  set(key, val) {
    return new Promise(resolve => {
      // Always write to localStorage as offline cache
      this._setLocal(key, val);
      if (this._tg) {
        TG.CloudStorage.setItem(key, val, (err) => resolve(!err));
      } else {
        resolve(true);
      }
    });
  },

  // Get all keys matching a prefix (used to load all monthly buckets)
  getKeys() {
    return new Promise(resolve => {
      if (this._tg) {
        TG.CloudStorage.getKeys((err, keys) => resolve(err ? [] : (keys || [])));
      } else {
        const keys = [];
        try {
          for (let i = 0; i < localStorage.length; i++) {
            const k = localStorage.key(i);
            if (k) keys.push(k);
          }
        } catch {}
        resolve(keys);
      }
    });
  }
};

// ── ENTRY STORAGE HELPERS ──
// Entries are bucketed by month: key = "j_entries_YYYY_MM"
// Theme stored at key "j_theme"

function monthKey(dateStr) {
  // dateStr = "DD.MM.YYYY"
  const [d, m, y] = dateStr.split('.');
  return `j_entries_${y}_${m}`;
}

async function loadAllEntries() {
  const keys = await Storage.getKeys();
  const entryKeys = keys.filter(k => k.startsWith('j_entries_'));
  if (!entryKeys.length) return [];
  const all = [];
  for (const k of entryKeys) {
    const raw = await Storage.get(k);
    if (raw) {
      try { all.push(...JSON.parse(raw)); } catch {}
    }
  }
  // sort newest first
  all.sort((a, b) => b.ts - a.ts);
  return all;
}

async function saveEntry(entry) {
  const k = monthKey(entry.date);
  const raw = await Storage.get(k);
  let bucket = [];
  try { bucket = raw ? JSON.parse(raw) : []; } catch {}
  const idx = bucket.findIndex(e => e.date === entry.date);
  if (idx >= 0) bucket[idx] = entry; else bucket.push(entry);
  await Storage.set(k, JSON.stringify(bucket));
}

async function loadTheme() {
  const t = await Storage.get('j_theme');
  return t || 'bw';
}

async function saveTheme(name) {
  await Storage.set('j_theme', name);
}

// ── BOOT ──
const now = new Date();
const pad = n => n.toString().padStart(2,'0');
const dateKey = d => `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()}`;
const todayKey = dateKey(now);
const fmtR = v => v%1===0 ? v+'.0' : String(v);

let entries = []; // populated after async load
let appReady = false;

/* rating → cell color */
function cellColor(rating) {
  const t = THEMES[currentTheme];
  const idx = Math.min(9, Math.max(0, Math.round(rating) - 1));
  return t.scale[idx];
}
function cellTextColor(rating) {
  const t = THEMES[currentTheme];
  const idx = Math.min(9, Math.max(0, Math.round(rating) - 1));
  return t.cellText(idx);
}
function ratingIdx(v) { return Math.min(9, Math.max(0, Math.round(v) - 1)); }
function uiColor(v) { return THEMES[currentTheme].uiScale[ratingIdx(v)]; }

/* apply UI accent color */
const slider    = document.getElementById('ratingSlider');
const ratingNum = document.getElementById('ratingNum');
const ratingLbl = document.getElementById('ratingLabel');
const noteArea  = document.getElementById('noteArea');
const charCount = document.getElementById('charCount');
const saveBtn   = document.getElementById('saveBtn');
const toast     = document.getElementById('toast');

function applyUIColor(v) {
  const col = uiColor(v);
  const pct = ((v-1)/9*100).toFixed(1)+'%';
  document.documentElement.style.setProperty('--accent', col);
  document.documentElement.style.setProperty('--glow', THEMES[currentTheme].glow(col));
  slider.style.background = `linear-gradient(to right,${col} 0%,${col} ${pct},rgba(255,255,255,0.07) ${pct},rgba(255,255,255,0.07) 100%)`;
}

function setTheme(name, save = true) {
  currentTheme = name;
  if (save) saveTheme(name);
  document.body.className = 'theme-' + name;
  document.querySelectorAll('.th-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === name));
  applyUIColor(parseFloat(slider.value));
  if (!document.getElementById('tab-month').classList.contains('active')) return;
  renderCal();
}

document.querySelectorAll('.th-btn').forEach(btn => {
  btn.addEventListener('click', () => setTheme(btn.dataset.theme));
});

/* date header */
document.getElementById('dateDisplay').textContent =
  `${DAYS_RU[now.getDay()]}, ${now.getDate()} ${MONTHS_GEN[now.getMonth()]} ${now.getFullYear()}`;

// Show loading state until data is ready
document.getElementById('saveBtn').disabled = true;
document.getElementById('saveBtn').textContent = 'загрузка…';

let currentTheme = 'bw';

// Async boot
(async () => {
  // Load theme
  currentTheme = await loadTheme();

  // Load all entries
  entries = await loadAllEntries();

  // Pre-fill today if exists
  const te = entries.find(e => e.date === todayKey);
  if (te) {
    slider.value = te.rating;
    noteArea.value = te.note || '';
    charCount.textContent = (te.note||'').length;
    ratingNum.textContent = fmtR(te.rating);
    ratingLbl.textContent = LABELS[te.rating] || '';
  }

  setTheme(currentTheme, false);
  appReady = true;
  document.getElementById('saveBtn').disabled = false;
  document.getElementById('saveBtn').textContent = 'сохранить день';
})();

slider.addEventListener('input', () => {
  const v = parseFloat(slider.value);
  ratingNum.textContent = fmtR(v);
  ratingLbl.textContent = LABELS[v] || '';
  applyUIColor(v);
});
noteArea.addEventListener('input', () => { charCount.textContent = noteArea.value.length; });

saveBtn.addEventListener('click', async () => {
  if (!appReady) return;
  const val = parseFloat(slider.value), note = noteArea.value.trim();
  const entry = { date: todayKey, rating: val, note, ts: Date.now() };

  // Update local array
  const idx = entries.findIndex(e => e.date === todayKey);
  if (idx >= 0) entries[idx] = entry; else entries.unshift(entry);

  // Persist
  saveBtn.disabled = true;
  await saveEntry(entry);
  saveBtn.disabled = false;

  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
  if (curY === now.getFullYear() && curM === now.getMonth()) renderCal();
});

/* TABS */
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'month') renderCal();
  });
});

/* MONTH */
let curY = now.getFullYear(), curM = now.getMonth();
document.getElementById('prevMonth').addEventListener('click', () => { curM--; if(curM<0){curM=11;curY--;} renderCal(); });
document.getElementById('nextMonth').addEventListener('click', () => { curM++; if(curM>11){curM=0;curY++;} renderCal(); });

function renderCal() {
  document.getElementById('monthName').textContent = MONTHS_RU[curM];
  document.getElementById('monthYear').textContent = curY;
  document.getElementById('detail').classList.remove('visible');

  const firstDow = (new Date(curY, curM, 1).getDay() + 6) % 7;
  const daysInMonth = new Date(curY, curM+1, 0).getDate();
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  for (let i = 0; i < firstDow; i++) {
    const c = document.createElement('div'); c.className = 'cal-cell empty'; grid.appendChild(c);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${pad(d)}.${pad(curM+1)}.${curY}`;
    const entry = entries.find(e => e.date === key);
    const isToday = curY===now.getFullYear() && curM===now.getMonth() && d===now.getDate();
    const cell = document.createElement('div');
    cell.className = 'cal-cell' + (entry ? ' has-entry' : '') + (isToday ? ' today' : '');

    if (entry) {
      const bg  = cellColor(entry.rating);
      const txt = cellTextColor(entry.rating);
      cell.style.background = bg;
      const dn = document.createElement('div'); dn.className = 'cal-day-num'; dn.textContent = d; dn.style.color = txt + 'aa';
      const ds = document.createElement('div'); ds.className = 'cal-score'; ds.textContent = fmtR(entry.rating); ds.style.color = txt;
      cell.appendChild(dn); cell.appendChild(ds);
      cell.addEventListener('click', () => showDetail(entry, key, bg, txt));
    } else {
      const dn = document.createElement('div'); dn.className = 'cal-day-num'; dn.textContent = d;
      cell.appendChild(dn);
    }
    grid.appendChild(cell);
  }
}

function showDetail(entry, key, bg, txt) {
  const [d,m,y] = key.split('.');
  const dObj = new Date(parseInt(y), parseInt(m)-1, parseInt(d));
  document.getElementById('detailDate').textContent = `${DAYS_RU[dObj.getDay()]}, ${parseInt(d)} ${MONTHS_GEN[parseInt(m)-1]} ${y}`;
  const sc = document.getElementById('detailScore');
  sc.textContent = fmtR(entry.rating);
  sc.style.color = uiColor(entry.rating);
  document.getElementById('detailLabel').textContent = LABELS[entry.rating] || '';
  const dn = document.getElementById('detailNote');
  if (entry.note) { dn.className = 'detail-note'; dn.textContent = entry.note; }
  else { dn.className = 'no-note'; dn.textContent = 'нет заметки'; }
  const det = document.getElementById('detail');
  det.style.borderLeftColor = uiColor(entry.rating);
  det.classList.add('visible');
  setTimeout(() => det.scrollIntoView({ behavior:'smooth', block:'nearest' }), 50);
}
</script>
</body>
</html>
